services:
  mysql:
    image: mysql:8.0
    container_name: thesis-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: thesis_system
      TZ: Asia/Shanghai
    ports:
      - "23306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - thesis-network

  redis:
    image: redis:7-alpine
    container_name: thesis-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - thesis-network

volumes:
  mysql-data:
  redis-data:


networks:
  thesis-network:
    driver: bridge
