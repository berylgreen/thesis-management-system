server:
  port: 8080

spring:
  application:
    name: thesis-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/thesis_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: your_database_password

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: your_redis_password_if_needed

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 文件存储路径
file:
  upload-path: ./uploads/

# JWT 配置
jwt:
  secret: CHANGE-THIS-TO-A-STRONG-256-BIT-SECRET-KEY-IN-PRODUCTION
  expiration: 86400000  # 24小时（毫秒）
