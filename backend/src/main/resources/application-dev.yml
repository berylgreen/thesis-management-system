spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/thesis_dev;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    username: sa
    password:

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # 覆盖 MyBatis-Plus 日志为简洁模式
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
