version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: thesis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: thesis_system
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - thesis-network

  redis:
    image: redis:7-alpine
    container_name: thesis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - thesis-network

  backend:
    build: ./backend
    container_name: thesis-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/thesis_system?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    volumes:
      - ./uploads:/app/uploads
    networks:
      - thesis-network

  frontend:
    build: ./frontend
    container_name: thesis-frontend
    ports:
      - "8888:80"
    depends_on:
      - backend
    networks:
      - thesis-network

volumes:
  mysql-data:
  redis-data:


networks:
  thesis-network:
    driver: bridge
